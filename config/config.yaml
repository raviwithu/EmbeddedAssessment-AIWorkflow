# Embedded Assessment Platform — Configuration
# Copy to config.local.yaml and edit for your environment.

targets:
  - name: "linux-device-01"
    platform: linux           # linux | android
    connection:
      method: ssh             # ssh | adb
      host: "192.168.1.100"
      port: 22
      username: "root"
      # auth: key | password
      auth: key
      key_path: "~/.ssh/id_ed25519"
      # password: ""          # only if auth=password
      timeout_seconds: 10
      command_timeout: 30    # per-command timeout in seconds

modules:
  process_inventory:
    enabled: true
  service_port_inventory:
    enabled: true
  service_process_map:
    enabled: true
  hardening_checks:
    enabled: true
  hardware_comm:
    enabled: true

output:
  directory: "./output"
  formats:
    - json
    - html
    - markdown

logging:
  level: "INFO"               # DEBUG | INFO | WARNING | ERROR
  file: "./output/assessment.log"
